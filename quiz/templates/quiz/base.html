{% load static %}
<!doctype html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}AgribankQ{% endblock %}</title>
    <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet">
    <link href="{% static 'css/bootstrap-icons.min.css' %}" rel="stylesheet">
    <link href="{% static 'css/custom.css' %}" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg mb-4" style="background-color: #AE1C3F;">
    <div class="container">
        <a class="navbar-brand text-white fw-bold" href="{% url 'exam_list' %}">
            <i class="bi bi-mortarboard-fill me-2"></i>AgribankQ
        </a>
        {% if user.is_authenticated %}
        <div class="ms-auto d-flex align-items-center gap-3">
            <span class="text-white"><i class="bi bi-person-circle me-1"></i>{{ user.username }}</span>
            <form method="post" action="{% url 'logout' %}" class="d-inline">
                {% csrf_token %}
                <button type="submit" class="btn btn-outline-light btn-sm">
                    <i class="bi bi-box-arrow-right me-1"></i>Đăng xuất
                </button>
            </form>
        </div>
        {% endif %}
    </div>
</nav>

<main class="container pb-5">
    {% block content %}{% endblock %}
</main>

<footer class="mt-5 text-center text-muted py-3 border-top">
    <div class="container">
        © {% now "Y" %} Agribank Chi nhánh Giá Rai Bạc Liêu - AgribankQ
    </div>
</footer>

<script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
</body>
</html>
