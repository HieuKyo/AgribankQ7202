{% load static %}
<!doctype html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Đăng nhập - AgribankQ</title>
    <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet">
    <link href="{% static 'css/custom.css' %}" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center" style="min-height: 100vh;">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-sm-8 col-md-5 col-lg-4">
            <div class="card">
                <div class="card-body p-4">
                    <div class="text-center mb-4">
                        <img src="{% static 'img/agribank_logo.png' %}" alt="Agribank" style="max-height: 60px;" class="mb-3">
                        <h4 class="fw-bold" style="color: #AE1C3F;">AgribankQ</h4>
                        <p class="text-muted small">Đăng nhập để tiếp tục</p>
                    </div>

                    {% if form.errors %}
                    <div class="alert alert-danger py-2 small">
                        Tên đăng nhập hoặc mật khẩu không đúng.
                    </div>
                    {% endif %}

                    <form method="post" action="{% url 'login' %}">
                        {% csrf_token %}
                        <input type="hidden" name="next" value="{{ next }}">
                        <div class="mb-3">
                            <label for="id_username" class="form-label fw-semibold">Tên đăng nhập</label>
                            <input type="text" class="form-control" id="id_username" name="username"
                                   autofocus autocomplete="username" required>
                        </div>
                        <div class="mb-4">
                            <label for="id_password" class="form-label fw-semibold">Mật khẩu</label>
                            <input type="password" class="form-control" id="id_password" name="password"
                                   autocomplete="current-password" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Đăng nhập</button>
                    </form>
                </div>
            </div>
            <p class="text-center text-muted small mt-3">
                © {% now "Y" %} Agribank Chi nhánh Giá Rai Bạc Liêu
            </p>
        </div>
    </div>
</div>
<script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
</body>
</html>
